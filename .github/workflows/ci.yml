name: CI - Build & Quality Gate

on:
  pull_request:
  push:

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Checking HTML files exist and are well-formed..."
          for file in $(find . -name '*.html' -not -path './.git/*'); do
            echo "  Validating: $file"
            if ! head -1 "$file" | grep -qi '<!doctype\|<html'; then
              echo "  ERROR: $file does not appear to be valid HTML"
              exit 1
            fi
          done
          echo "All HTML files validated."

      - name: Validate CSS
        run: |
          echo "Checking CSS files exist..."
          for file in $(find . -name '*.css' -not -path './.git/*'); do
            echo "  Found: $file"
            if [ ! -s "$file" ]; then
              echo "  ERROR: $file is empty"
              exit 1
            fi
          done
          echo "All CSS files validated."

      - name: Validate JS
        run: |
          echo "Checking JS syntax..."
          for file in $(find . -name '*.js' -not -path './.git/*' -not -path './node_modules/*'); do
            echo "  Checking: $file"
            node --check "$file"
          done
          echo "All JS files passed syntax check."

      - name: Check for broken internal links
        run: |
          echo "Checking internal link references..."
          errors=0
          for file in $(find . -name '*.html' -not -path './.git/*'); do
            links=$(grep -oP '(?:href|src)="([^"#][^"]*)"' "$file" | grep -oP '"[^"]*"' | tr -d '"' | grep -v '^http' | grep -v '^mailto' || true)
            dir=$(dirname "$file")
            for link in $links; do
              link_path="${link%%#*}"
              if [ -z "$link_path" ]; then continue; fi
              target="$dir/$link_path"
              if [ ! -f "$target" ]; then
                echo "  BROKEN: $file -> $link"
                errors=$((errors + 1))
              fi
            done
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors broken link(s)"
            exit 1
          fi
          echo "No broken internal links found."

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: |
            *.html
            *.css
            *.js
            *.svg
            pic/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, test, sonarcloud]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
