<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B&R Events - Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <a href="index.html" class="auth-logo">
        <img src="logo.svg" alt="B&R Events" width="80" height="80">
      </a>
      <h1>Welcome Back</h1>
      <p>Plan your next unforgettable event.</p>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <form id="login-form" class="auth-form">
          <input type="email" placeholder="Email Address" required>
          <input type="password" placeholder="Password" required>
          <button type="submit" class="btn">Log In</button>
          <p class="auth-link">Forgot your password? <a href="#">Reset it</a></p>
        </form>

        <form id="signup-form" class="auth-form hidden">
          <div class="form-row">
            <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>
          </div>
          <input type="email" placeholder="Email Address" required>
          <input type="tel" placeholder="Phone Number">
          <input type="password" placeholder="Password" required>
          <input type="password" placeholder="Confirm Password" required>
          <button type="submit" class="btn">Create Account</button>
          <p class="auth-link">By signing up, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.auth-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.auth-tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var target = tab.getAttribute('data-tab');
        document.getElementById('login-form').classList.toggle('hidden', target !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', target !== 'signup');
      });
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });

    document.getElementById('signup-form').addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
