<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B&R Events - Welcome</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <a href="index.html" class="auth-logo">
        <img src="logo.svg" alt="B&R Events" width="80" height="80">
      </a>
      <h1>Welcome</h1>
      <p>Plan your next unforgettable event.</p>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <h2 class="auth-heading" id="auth-heading">Log in to your account</h2>

        <form id="auth-form" class="auth-form">
          <div id="name-fields" class="form-row hidden">
            <input type="text" id="first-name" placeholder="First Name">
            <input type="text" id="last-name" placeholder="Last Name">
          </div>
          <input type="email" id="auth-email" placeholder="Email Address" required>
          <div id="phone-field" class="hidden">
            <input type="tel" placeholder="Phone Number" style="width:100%">
          </div>
          <input type="password" id="auth-password" placeholder="Password" required>
          <div id="confirm-field" class="hidden">
            <input type="password" id="auth-confirm" placeholder="Confirm Password">
          </div>

          <button type="submit" class="btn" id="auth-submit">Log In</button>

          <div id="login-extras" class="auth-extras">
            <p class="auth-link">Forgot your password? <a href="#">Reset it</a></p>
            <div class="auth-divider"><span>or</span></div>
            <p class="auth-link">Don't have an account? <a href="#" id="switch-to-signup">Sign up</a></p>
          </div>

          <div id="signup-extras" class="auth-extras hidden">
            <p class="auth-link">By signing up, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
            <div class="auth-divider"><span>or</span></div>
            <p class="auth-link">Already have an account? <a href="#" id="switch-to-login">Log in</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    var isSignup = false;

    function toggleMode(signup) {
      isSignup = signup;
      document.getElementById('auth-heading').textContent = signup ? 'Create your account' : 'Log in to your account';
      document.getElementById('auth-submit').textContent = signup ? 'Create Account' : 'Log In';
      document.getElementById('name-fields').classList.toggle('hidden', !signup);
      document.getElementById('phone-field').classList.toggle('hidden', !signup);
      document.getElementById('confirm-field').classList.toggle('hidden', !signup);
      document.getElementById('login-extras').classList.toggle('hidden', signup);
      document.getElementById('signup-extras').classList.toggle('hidden', !signup);

      var firstName = document.getElementById('first-name');
      var lastName = document.getElementById('last-name');
      var confirm = document.getElementById('auth-confirm');
      if (signup) {
        firstName.required = true;
        lastName.required = true;
        confirm.required = true;
      } else {
        firstName.required = false;
        lastName.required = false;
        confirm.required = false;
      }
    }

    document.getElementById('switch-to-signup').addEventListener('click', function (e) {
      e.preventDefault();
      toggleMode(true);
    });

    document.getElementById('switch-to-login').addEventListener('click', function (e) {
      e.preventDefault();
      toggleMode(false);
    });

    document.getElementById('auth-form').addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });

    if (window.location.hash === '#signup') toggleMode(true);
  </script>
</body>
</html>
