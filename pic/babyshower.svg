  <circle cx="352" cy="235" r="14" fill="#e8a0bf" opacity="0.5"/>
  <!-- Sign -->
  <rect x="240" y="170" width="120" height="50" rx="8" fill="#fff" opacity="0.6" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="300" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#d4789b" opacity="0.7">Welcome</text>
  <text x="300" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#d4789b" opacity="0.6">Baby Shower Brunch</text>
