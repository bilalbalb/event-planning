  <polygon points="200,120 215,150 230,120" fill="#c9a84c" opacity="0.3"/>
  <polygon points="250,120 265,150 280,120" fill="#f5c6d0" opacity="0.5"/>
  <polygon points="300,120 315,150 330,120" fill="#d4789b" opacity="0.3"/>
  <polygon points="350,120 365,150 380,120" fill="#e8a0bf" opacity="0.4"/>
  <polygon points="400,120 415,150 430,120" fill="#c9a84c" opacity="0.3"/>
  <!-- Dessert table -->
  <rect x="150" y="260" width="300" height="10" rx="3" fill="#c9a84c" opacity="0.25"/>
  <rect x="160" y="270" width="8" height="60" fill="#c9a84c" opacity="0.2"/>
  <rect x="432" y="270" width="8" height="60" fill="#c9a84c" opacity="0.2"/>
  <!-- Cupcakes -->
  <rect x="200" y="240" width="24" height="20" rx="4" fill="#f5c6d0" opacity="0.6"/>
  <circle cx="212" cy="235" r="14" fill="#e8a0bf" opacity="0.5"/>
  <rect x="270" y="240" width="24" height="20" rx="4" fill="#f5c6d0" opacity="0.6"/>
