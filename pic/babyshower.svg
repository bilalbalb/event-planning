<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fdf8f0"/>
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fce4ec"/><stop offset="100%" style="stop-color:#f8bbd0"/></linearGradient></defs>
  <rect width="600" height="400" fill="url(#bg)" opacity="0.5"/>
  <!-- Balloon garland -->
  <circle cx="80" cy="60" r="30" fill="#e8a0bf" opacity="0.5"/>
  <circle cx="130" cy="45" r="35" fill="#f5c6d0" opacity="0.5"/>
  <circle cx="185" cy="40" r="28" fill="#c9a84c" opacity="0.3"/>
  <circle cx="230" cy="50" r="32" fill="#e8a0bf" opacity="0.4"/>
  <circle cx="280" cy="38" r="30" fill="#d4789b" opacity="0.3"/>
  <circle cx="330" cy="45" r="34" fill="#f5c6d0" opacity="0.45"/>
  <circle cx="380" cy="40" r="28" fill="#c9a84c" opacity="0.35"/>
  <circle cx="425" cy="50" r="32" fill="#e8a0bf" opacity="0.4"/>
  <circle cx="475" cy="42" r="30" fill="#d4789b" opacity="0.35"/>
  <circle cx="520" cy="55" r="28" fill="#f5c6d0" opacity="0.5"/>
  <!-- Banner -->
  <path d="M120 120 L480 120" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
